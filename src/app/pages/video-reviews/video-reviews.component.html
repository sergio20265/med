<app-breadcumb [title]="'Видео отзывы'"></app-breadcumb>

<div class="video-reviews-container">
  <div class="container">
    <h1 class="page-title">Видео отзывы</h1>

    <!-- Состояние загрузки -->
    <div *ngIf="loading" class="loading-state">
      <div class="loading-spinner"></div>
      <p>Загружаем видео отзывы...</p>
    </div>

    <!-- Пустое состояние -->
    <div *ngIf="!loading && videos.length === 0" class="empty-state">
      <div class="empty-icon">📹</div>
      <h3>Пока нет видео отзывов</h3>
      <p>Скоро здесь появятся отзывы наших клиентов</p>
    </div>

    <!-- Карусель с видео -->
    <div *ngIf="!loading && videos.length > 0" class="video-carousel">
      <div class="carousel-container">
        <!-- Кнопка назад -->
        <button
          class="carousel-btn carousel-btn-prev"
          [class.disabled]="!canScrollLeft"
          (click)="prevSlide()"
          [disabled]="!canScrollLeft"
          aria-label="Предыдущее видео">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <!-- Слайды -->
        <div class="carousel-track-container">
          <div
            class="carousel-track"
            [style.transform]="'translateX(-' + (currentSlide * (100 / slidesPerView)) + '%)'">
            <div
              *ngFor="let video of videos; let i = index; trackBy: trackByVideo"
              class="carousel-slide"
              [style.flex]="'0 0 ' + (100 / slidesPerView) + '%'">
              <!-- Карточка — клик открывает попап -->
              <div class="video-card" (click)="openModal(video)" role="button" tabindex="0"
                   (keydown.enter)="openModal(video)" aria-label="Смотреть отзыв">
                <div class="video-wrapper"
                     [class.landscape]="video.orientation === 'landscape'"
                     [class.portrait]="video.orientation === 'portrait'">
                  <!-- Превью без controls; ориентация определяется по событию loadedmetadata -->
                  <video
                    [src]="getVideoUrl(video)"
                    preload="metadata"
                    muted
                    playsinline
                    class="video-element"
                    [attr.aria-label]="'Видео отзыв ' + (i + 1)"
                    (loadedmetadata)="onVideoMetadata($event, video)">
                  </video>
                  <!-- Иконка воспроизведения -->
                  <div class="play-button-overlay">
                    <div class="play-button">
                      <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                        <path d="M8 5V19L19 12L8 5Z" fill="currentColor"/>
                      </svg>
                    </div>
                  </div>
                </div>
                <div class="video-info">
                  <h3 class="video-title">Отзыв клиента</h3>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Кнопка вперед -->
        <button
          class="carousel-btn carousel-btn-next"
          [class.disabled]="!canScrollRight"
          (click)="nextSlide()"
          [disabled]="!canScrollRight"
          aria-label="Следующее видео">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Индикаторы -->
      <div class="carousel-indicators" *ngIf="videos.length > slidesPerView">
        <button
          *ngFor="let video of videos; let i = index"
          class="indicator"
          [class.active]="i >= currentSlide && i < currentSlide + slidesPerView"
          (click)="goToSlide(i)"
          [attr.aria-label]="'Перейти к видео ' + (i + 1)">
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Видео попап — размер адаптируется под ориентацию видео -->
<div *ngIf="selectedVideo" class="vr-modal-overlay" (click)="onOverlayClick($event)">
  <div class="vr-modal" [class.landscape]="selectedVideo.orientation === 'landscape'">
    <button class="vr-modal-close" (click)="closeModal()" aria-label="Закрыть">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6L18 18" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
    <video
      #modalVideo
      [src]="getVideoUrl(selectedVideo)"
      controls
      autoplay
      playsinline
      class="vr-modal-video"
      [class.landscape]="selectedVideo.orientation === 'landscape'">
    </video>
  </div>
</div>
